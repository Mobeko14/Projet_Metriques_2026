<!DOCTYPE html>
<html>
<head>
  <title>Graphique météo</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body>
  <h1>Température Paris</h1>
  <div id="chart" style="width:100%; height:500px;"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(drawChart);

    async function drawChart() {
      try {
        const res = await fetch('/paris');
        const json = await res.json();

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'Date');
        data.addColumn('number', 'Température');

        json.forEach(p => {
          data.addRow([p.datetime, p.temperature_c]);
        });

        const chart = new google.visualization.LineChart(
          document.getElementById('chart')
        );

        chart.draw(data, { title: 'Température Paris' });

      } catch (err) {
        console.error("Erreur:", err);
        document.body.innerHTML += "<p>Erreur JS (voir console)</p>";
      }
    }
  </script>
</body>
</html>
